<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#3584e4" />
  <circle cx="64" cy="64" r="56" fill="#62a0ea" />

  <!-- Code brackets -->
  <text x="20" y="82" font-family="monospace" font-size="64" font-weight="bold" fill="white" opacity="0.9">&lt;</text>
  <text x="82" y="82" font-family="monospace" font-size="64" font-weight="bold" fill="white" opacity="0.9">/&gt;</text>

  <!-- Swedish flag colors accent -->
  <rect x="44" y="38" width="40" height="6" rx="3" fill="#fecc00" />
  <rect x="44" y="50" width="32" height="6" rx="3" fill="#fecc00" />
  <rect x="44" y="62" width="36" height="6" rx="3" fill="#fecc00" />
  <rect x="44" y="74" width="28" height="6" rx="3" fill="#fecc00" />

  <!-- Star for kids -->
  <circle cx="100" cy="28" r="14" fill="#fecc00" />
  <text x="93" y="35" font-size="20" fill="#3584e4" font-weight="bold">SE</text>
</svg>
